format = """
$username\
$hostname\
$directory\
$git_branch\
$shell\
$cmd_duration\
$fill\
$time\
$line_break\
$character"""

[username]
style_user = 'green bold'
style_root = 'red bold'
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname]($style) '
trim_at = "."
style = 'bold purple'
disabled = false

[fill]
symbol = ' '

[shell]
fish_indicator = 'Fish пң№ '
bash_indicator = 'Bash оҜҠ '
powershell_indicator = 'п‘ _'
unknown_indicator = 'mystery shell'
format = "shell [$indicator]($style) "
style = 'bold purple'
disabled = false

# configure directory
[directory]
read_only = " п Ҫ"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
truncation_symbol = "вҖҰ/"
style = "bold italic blue"

[cmd_duration]
format = 'рҹ•ҷ [$duration]($style) '
min_time = 1
show_milliseconds = false
style = "bold italic red"
disabled = false

[time]
disabled = false
format = '[$time]($style) '
time_format = '%T'

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]                            # The name of the module we are configuring is "character"
success_symbol = '[вһң](bold green)'    # The 'success_symbol' segment is being set to 'вһң' with the color 'bold green'
error_symbol = '[вң—](bold red)'
# п”¶ п”ҙ

[aws]
symbol = "оҢҪ  "

[conda]
symbol = "п„Ң "

[dart]
symbol = "оһҳ "

#[directory]
#read_only = " п Ҫ"

[docker_context]
symbol = "пҢҲ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "оүө "

[elm]
symbol = "оҳ¬ "

[git_branch]
symbol = "пҗҳ "

[golang]
symbol = "оҳ§ "

[hg_branch]
symbol = "пҗҳ "

[java]
symbol = "оү– "

[julia]
symbol = "оҳӨ "

[haskell]
symbol = "О» "

[memory_usage]
symbol = "пЎҡ "

[nim]
symbol = "пҡӨ "

[nix_shell]
symbol = "пӢң "

[package]
symbol = "пЈ– "

[perl]
symbol = "оқ© "

[php]
symbol = "оҳҲ "

[python]
symbol = "рҹҗҚ "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "оҲҫ "

[rust]
symbol = "оһЁ "

[scala]
symbol = "оң· "

[shlvl]
symbol = "п„  "

[swift]
symbol = "пҜЈ "

[nodejs]
format = "via [пўҳ Node.js $version](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]
